name: CyberSecurity Bot CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggers

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_NAME: 'CyberSecurityAwareness'

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            framework: net10.0
          - os: windows-latest
            framework: net10.0
          - os: macos-latest
            framework: net10.0

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore /p:NoWarn=CA1416,CA1418

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true  # Remove this once you add tests

    - name: Create dummy audio file for testing (if missing)
      if: runner.os == 'windows-latest'
      shell: pwsh
      run: |
        if (-not (Test-Path "greeting.wav")) {
          Write-Host "Creating placeholder audio file..."
          # Create a minimal valid WAV file
          $wavBytes = @(
            0x52,0x49,0x46,0x46,0x24,0x00,0x00,0x00,0x57,0x41,0x56,0x45,
            0x66,0x6D,0x74,0x20,0x10,0x00,0x00,0x00,0x01,0x00,0x01,0x00,
            0x22,0x56,0x00,0x00,0x44,0xAC,0x00,0x00,0x02,0x00,0x10,0x00,
            0x64,0x61,0x74,0x61,0x00,0x00,0x00,0x00
          )
          [System.IO.File]::WriteAllBytes("greeting.wav", $wavBytes)
        }

    - name: Publish artifact (Windows)
      if: runner.os == 'windows-latest'
      run: |
        dotnet publish --configuration Release --output ./publish/windows --runtime win-x64 --self-contained false /p:NoWarn=CA1416,CA1418
        echo "✅ Build successful for Windows"

    - name: Publish artifact (Linux)
      if: runner.os == 'ubuntu-latest'
      run: |
        dotnet publish --configuration Release --output ./publish/linux --runtime linux-x64 --self-contained false /p:NoWarn=CA1416,CA1418
        echo "✅ Build successful for Linux"

    - name: Publish artifact (macOS)
      if: runner.os == 'macos-latest'
      run: |
        dotnet publish --configuration Release --output ./publish/macos --runtime osx-x64 --self-contained false /p:NoWarn=CA1416,CA1418
        echo "✅ Build successful for macOS"

    - name: Upload build artifacts (Windows)
      if: runner.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: CyberSecurityBot-Windows
        path: ./publish/windows/**
        retention-days: 30

    - name: Upload build artifacts (Linux)
      if: runner.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: CyberSecurityBot-Linux
        path: ./publish/linux/**
        retention-days: 30

    - name: Upload build artifacts (macOS)
      if: runner.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: CyberSecurityBot-macOS
        path: ./publish/macos/**
        retention-days: 30

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the workflow if code quality checks fail
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Run static code analysis with warning suppression
      run: |
        dotnet tool install -g dotnet-format
        dotnet format --verify-no-changes --verbosity diagnostic --no-restore || true
      continue-on-error: true

    - name: Check for common issues (non-blocking)
      run: |
        echo "🔍 Checking for TODO comments..."
        if grep -r "TODO" --include="*.cs" . 2>/dev/null; then
          echo "⚠️ Found TODO comments in code"
        else
          echo "✅ No TODO comments found"
        fi
        
        echo "🔍 Checking file encoding..."
        find . -name "*.cs" -exec file "{}" \; 2>/dev/null | grep -v "UTF-8" && echo "⚠️ Non-UTF8 files found" || echo "✅ All files are UTF-8"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the workflow if security scan finds issues
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Run security audit
      run: dotnet list package --vulnerable --include-transitive || echo "No vulnerabilities found"

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Check for hardcoded secrets
      run: |
        if grep -r "password\s*=\s*\"[^\"]\+\"" --include="*.cs" -i . 2>/dev/null; then
          echo "⚠️ Potential hardcoded passwords detected - please review"
        else
          echo "✅ No obvious hardcoded secrets found"
        fi

  create-release:
    name: Create Release
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create ZIP archives
      run: |
        cd artifacts
        if [ -d "CyberSecurityBot-Windows" ]; then
          zip -r ../CyberSecurityBot-Windows.zip CyberSecurityBot-Windows/
        fi
        if [ -d "CyberSecurityBot-Linux" ]; then
          zip -r ../CyberSecurityBot-Linux.zip CyberSecurityBot-Linux/
        fi
        if [ -d "CyberSecurityBot-macOS" ]; then
          zip -r ../CyberSecurityBot-macOS.zip CyberSecurityBot-macOS/
        fi

    - name: Get version
      id: get_version
      run: |
        echo "VERSION=$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT
        echo "TAG_NAME=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
        name: "CyberSecurity Bot - ${{ steps.get_version.outputs.VERSION }}"
        body: |
          ## 🛡️ Cybersecurity Awareness Bot Release
          
          ### Features
          - Interactive cybersecurity awareness chatbot
          - Password safety tips
          - Phishing awareness education
          - Safe browsing guidance
          - Voice greeting (Windows)
          
          ### Installation
          1. Download the appropriate ZIP for your OS
          2. Extract the files
          3. Run `CyberSecurityAwareness.exe` (Windows) or `dotnet CyberSecurityAwareness.dll` (Linux/macOS)
          
          ### System Requirements
          - .NET 10.0 Runtime
          - Windows: Audio capability for voice greeting
          - Linux/macOS: Console only (audio may not work)
          
          ### Note
          This is an automated build from commit: ${{ github.sha }}
        draft: false
        prerelease: false
        files: |
          CyberSecurityBot-Windows.zip
          CyberSecurityBot-Linux.zip
          CyberSecurityBot-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
