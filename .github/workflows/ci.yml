code-quality:
  name: Code Quality Checks
  runs-on: ubuntu-latest
  
  steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup .NET SDK
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: ${{ env.DOTNET_VERSION }}

  - name: Restore dependencies
    run: dotnet restore

  - name: Build with warning suppression
    run: dotnet build --configuration Release --no-restore /p:NoWarn=CA1416,CA1418

  - name: Verify build succeeded
    run: echo "✅ Build completed successfully with platform warnings suppressed"
