name: CyberSecurity Bot CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Fix csproj file (remove absolute paths)
      shell: pwsh
      run: |
        $csproj = Get-Content "CyberSecurityAwareness.csproj" -Raw
        # Remove the problematic Compile line
        $csproj = $csproj -replace '<Compile Include="C:\\Users\\User\\Desktop\\Programming2A P1\\Program.cs" Link="Program.cs" />', ''
        $csproj = $csproj -replace '<Compile Update="VoiceManager.cs">.*?</Compile>', ''
        Set-Content "CyberSecurityAwareness.csproj" $csproj
        Write-Host "Fixed csproj file"
    
    - name: Ensure all .cs files exist
      shell: pwsh
      run: |
        $files = @(
            "Program.cs",
            "AsciiArt.cs", 
            "Chatbox.cs",
            "UIHelper.cs",
            "VoiceManager.cs"
        )
        
        foreach ($file in $files) {
            if (-not (Test-Path $file)) {
                Write-Host "Creating missing file: $file"
                New-Item -Path $file -ItemType File -Value "// Auto-generated file" -Force
            }
        }
        
        # Create proper Program.cs if missing or empty
        $programContent = Get-Content "Program.cs" -Raw -ErrorAction SilentlyContinue
        if ([string]::IsNullOrWhiteSpace($programContent) -or $programContent -eq "// Auto-generated file") {
            @'
